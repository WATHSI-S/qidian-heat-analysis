<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>起点天榜 · 热度洞察</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="noise-overlay"></div>

<nav class="site-nav">
  <a href="index.html" class="nav-brand">起点 · 天榜</a>
  <div class="nav-links">
    <a href="index.html" class="active">总览</a>
    <a href="analysis.html">深度分析</a>
    <a href="trends.html">风向推荐</a>
  </div>
</nav>

<header class="hero">
  <div class="hero-ornament top-ornament">◆ ◇ ◆</div>
  <h1 class="hero-title">
    <span class="title-brush">起点</span>
    <span class="title-divider">·</span>
    <span class="title-brush">天榜</span>
  </h1>
  <p class="hero-sub">周度热度洞察 · 八榜归一</p>
  <p class="hero-desc">揽月票、畅销、推荐、收藏、阅读、书友、更新、签约八榜之势<br/>每周自动采撷千卷，观网文风云变幻</p>
  <p class="hero-time" id="updateTime">— 等待天机降临 —</p>
  <div class="hero-ornament bottom-ornament">━ ◈ ━</div>
</header>

<main class="board">

  <!-- Overview: Heavenly Marks -->
  <section class="marks-row" id="overviewStats"></section>

  <!-- Main: Ranking Explorer -->
  <section class="panel rank-panel">
    <div class="panel-header">
      <h2 class="panel-title">榜位巡览</h2>
      <nav class="rank-pills" id="rankTabs"></nav>
    </div>
    <div class="panel-body">
      <div class="top-three-strip" id="topThreeCards"></div>
      <div class="chart-container" id="chart-rank-bars"></div>
    </div>
  </section>

  <!-- Middle row: Category + Status -->
  <div class="panel-row">
    <section class="panel">
      <h2 class="panel-title">诸天分类</h2>
      <div class="chart-container chart-sm" id="chart-category"></div>
    </section>
    <section class="panel">
      <h2 class="panel-title">书途终始</h2>
      <div class="chart-container chart-sm" id="chart-status"></div>
    </section>
  </div>

  <!-- Author leaderboard -->
  <section class="panel">
    <h2 class="panel-title">笔落惊风 — 作者上榜次数</h2>
    <div class="chart-container chart-md" id="chart-authors"></div>
  </section>

  <!-- Cross-rank dominators -->
  <section class="panel">
    <h2 class="panel-title">霸榜天卷 — 同现多榜之书</h2>
    <div class="crossrank-board" id="crossrankBoard"></div>
  </section>

  <!-- Ranking table -->
  <section class="panel">
    <div class="panel-header">
      <h2 class="panel-title">榜单名录</h2>
      <select class="table-pick" id="tableRankFilter"></select>
    </div>
    <div class="scroll-box">
      <table id="rankingTable">
        <thead>
          <tr><th>#</th><th>书名</th><th>作者</th><th>分类</th><th>状态</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </section>

</main>

<footer class="endnote">
  <p>数据采撷自 <a href="https://www.qidian.com" target="_blank" rel="noopener">起点中文网</a> 公开榜位 · 每周一早八时天机自动更新</p>
</footer>

<script defer src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<script defer src="app.js"></script>
</body>
</html>
