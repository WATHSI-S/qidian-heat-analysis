name: Weekly Qidian Scrape

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r scraper/requirements.txt
          playwright install chromium

      - name: Run scraper
        run: python scraper/crawl.py

      - name: Run text mining analysis
        run: python scraper/analysis/pipeline.py --text-only

      - name: Run data mining analysis
        continue-on-error: true
        run: python scraper/analysis/pipeline.py --data-mining-only

      - name: Run LLM analysis
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scraper/analysis/pipeline.py --skip-text-mining

      - name: Run AI Agent analysis
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scraper/analysis/pipeline.py --agent-only

      - name: Copy data into docs for deployment
        run: |
          rm -rf docs/data/
          cp -r data/ docs/data/

      - name: Commit and push if changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/data/
          if git diff --cached --quiet; then
            echo "No new data to commit"
          else
            git commit -m "data: weekly scrape $(date +%Y-W%V)"
            git push
          fi

      - name: Deploy to VPS via rsync
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            docs/ \
            ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }}:/var/www/qidian-heat-analysis/
